name: Daily pipeline validation

on:
  schedule:
    # 08:00 Asia/Kolkata, expressed in UTC for GitHub Actions cron.
    - cron: "30 2 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/reusable-validation.yml
  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_FALLBACK_API_KEY: ${{ secrets.GEMINI_FALLBACK_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_FALLBACK_API_KEY: ${{ secrets.OPENROUTER_FALLBACK_API_KEY }}
      VIDEO_PROVIDER_PROFILES_JSON: ${{ secrets.VIDEO_PROVIDER_PROFILES_JSON }}
      YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUN_TIMEZONE: Asia/Kolkata
      YOUTUBE_PRIVACY_STATUS: private
      VIDEO_DURATION_SECONDS: "8"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m app.main run
      - name: Preserve run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: data/runs/
          if-no-files-found: warn
      - name: Preserve failed MP4
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-video
          path: data/videos/*.mp4
          if-no-files-found: ignore
