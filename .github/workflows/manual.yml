name: Manual pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run checks only or publish one private Short."
        required: true
        default: validation
        type: choice
        options:
          - validation
          - publish

permissions:
  contents: write

jobs:
  validate:
    uses: ./.github/workflows/reusable-validation.yml
  publish:
    if: inputs.mode == 'publish'
    needs: validate
    uses: ./.github/workflows/daily.yml
    secrets: inherit
