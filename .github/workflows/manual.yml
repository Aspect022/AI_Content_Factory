name: Manual pipeline validation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Milestone 1 supports validation only."
        required: true
        default: validation
        type: choice
        options:
          - validation
          - publish

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/reusable-validation.yml
  publish:
    if: inputs.mode == 'publish'
    needs: validate
    uses: ./.github/workflows/daily.yml
    secrets: inherit
